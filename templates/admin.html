<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Aydın Market - Kontrol Merkezi</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root { --bg-dark: #0f0f13; --card-bg: #1a1a24; --accent: #ff8c00; --cyan: #00e5ff; --text-main: #e0e0e0; --text-muted: #8b8b9e; --border: #2a2a35; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Inter", sans-serif; background: var(--bg-dark); color: var(--text-main); }

  /* GİRİŞ EKRANI */
  #adminLogin { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
  .login-box { background: var(--card-bg); padding: 40px; border-radius: 16px; border: 1px solid var(--border); width: 350px; text-align: center; }
  .login-box h2 { margin-top: 0; color: var(--accent); }
  .login-box input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-dark); color: #fff; outline: none; }
  .login-box button { width: 100%; padding: 12px; background: var(--accent); color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }

  /* YAN MENÜ VE İÇERİK */
  #adminPanel { display: none; height: 100vh; }
  .sidebar { width: 250px; background: var(--card-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
  .logo { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 40px; font-style: italic; }
  .logo span { color: var(--accent); }
  .menu a { display: block; padding: 12px; color: var(--text-muted); text-decoration: none; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
  .menu a.active, .menu a:hover { background: rgba(255,140,0,0.1); color: var(--accent); border-left: 3px solid var(--accent); }
  .content { flex: 1; padding: 30px; overflow-y: auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
  
  /* KPI VE GRAFİK (Dashboard) */
  .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
  .kpi-card { background: var(--card-bg); padding: 25px; border-radius: 16px; border: 1px solid var(--border); }
  .kpi-card h3 { margin: 0 0 10px 0; color: var(--text-muted); font-size: 14px; text-transform: uppercase; }
  .kpi-card .value { font-size: 32px; font-weight: 900; color: #fff; }
  .chart-container { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); height: 350px;}

  /* ÜRÜN YÖNETİMİ BÖLÜMÜ */
  .product-form { background: var(--card-bg); padding: 25px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 30px; display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;}
  .form-group { display: flex; flex-direction: column; flex: 1; min-width: 150px;}
  .form-group label { font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
  .form-group input, .form-group select { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-dark); color: #fff; outline: none; }
  .product-form button { padding: 12px 25px; background: var(--cyan); color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; height: fit-content; transition: 0.2s;}
  .product-form button:hover { background: #fff; }

  /* BİLDİRİM KUTUSU */
  #adminMesaj { display: none; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
  .basarili { background: rgba(0, 255, 0, 0.1); color: #00ff00; border: 1px solid #00ff00; }
  .hatali { background: rgba(255, 0, 0, 0.1); color: #ff3333; border: 1px solid #ff3333; }
</style>
</head>
<body>

<div id="adminLogin">
  <div class="login-box">
    <h2>Yönetici Girişi</h2>
    <input type="password" id="adminPass" placeholder="••••••••">
    <button onclick="girisYap()">GİRİŞ YAP</button>
  </div>
</div>

<div id="adminPanel">
  
  <div class="sidebar">
    <div class="logo">Aydın<span>Market</span> <br><span style="font-size:12px; color:#666;">Admin Paneli</span></div>
    <div class="menu">
      <a id="btnDashboard" class="active" onclick="sekmeAc('dashboardSekmesi', 'btnDashboard')">📊 Genel Bakış</a>
      <a id="btnUrunler" onclick="sekmeAc('urunSekmesi', 'btnUrunler')">📦 Ürün Yönetimi</a>
      <a href="/products.html" target="_blank">🛒 Mağazaya Git</a>
    </div>
    <button onclick="window.location.reload()" style="margin-top:auto; padding:10px; background:none; border:1px solid var(--border); color:var(--text-muted); border-radius:8px; cursor:pointer;">Çıkış Yap</button>
  </div>

  <div class="content">
    
    <div id="dashboardSekmesi">
      <div class="header"><h1>KPI Özeti</h1></div>
      <div class="kpi-grid">
        <div class="kpi-card"><h3>Bugünkü Ciro</h3><div class="value">14.520 ₺</div></div>
        <div class="kpi-card"><h3>Toplam Sipariş</h3><div class="value">86 Adet</div></div>
        <div class="kpi-card"><h3 style="color:#ff3333;">Kritik Stok</h3><div class="value">4 Ürün</div></div>
      </div>
      <div class="chart-container"><canvas id="satisGrafigi"></canvas></div>
    </div>

    <div id="urunSekmesi" style="display:none;">
      <div class="header"><h1>Ürün Yönetimi</h1></div>
      
      <div id="adminMesaj"></div>

      <div class="product-form">
        <div class="form-group">
          <label>Ürün Adı</label>
          <input type="text" id="yeniUrunAd" placeholder="Örn: Nutella">
        </div>
        <div class="form-group">
          <label>Fiyat (₺)</label>
          <input type="number" id="yeniFiyat" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Stok Adedi</label>
          <input type="number" id="yeniStok" placeholder="100">
        </div>
        <div class="form-group">
          <label>Kategori</label>
          <select id="yeniKategori">
            <option value="1">Temel Gıda (1)</option>
            <option value="2">İçecekler (2)</option>
            <option value="3">Temizlik (3)</option>
            <option value="4">Atıştırmalık (4)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Resim Linki (.png)</label>
          <input type="text" id="yeniResim" placeholder="/static/images/urun.png">
        </div>
        <button onclick="urunEkle()">Ürünü Sisteme Ekle</button>
      </div>

    </div>

  </div>
</div>

<script>
// --- GİRİŞ VE SEKME KONTROLLERİ ---
function girisYap() {
  if(document.getElementById('adminPass').value === '1234') {
    document.getElementById('adminLogin').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'flex';
    grafikCiz();
  } else { alert("Hatalı Şifre!"); }
}

function sekmeAc(sekmeId, btnId) {
  document.getElementById('dashboardSekmesi').style.display = 'none';
  document.getElementById('urunSekmesi').style.display = 'none';
  
  document.getElementById('btnDashboard').classList.remove('active');
  document.getElementById('btnUrunler').classList.remove('active');
  
  document.getElementById(sekmeId).style.display = 'block';
  document.getElementById(btnId).classList.add('active');
}

// --- VERİTABANINA YENİ ÜRÜN GÖNDERME ---
async function urunEkle() {
  const ad = document.getElementById('yeniUrunAd').value;
  const fiyat = document.getElementById('yeniFiyat').value;
  const stok = document.getElementById('yeniStok').value;
  const kategori = document.getElementById('yeniKategori').value;
  const resim = document.getElementById('yeniResim').value;
  const mesajKutu = document.getElementById('adminMesaj');

  if(ad === "" || fiyat === "" || stok === "") {
      mesajKutu.textContent = "Lütfen Ürün Adı, Fiyat ve Stok bilgilerini giriniz.";
      mesajKutu.className = "hatali";
      mesajKutu.style.display = "block";
      return;
  }

  try {
      const cevap = await fetch('/admin/urun-ekle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
              urun_adi: ad,
              fiyat: parseFloat(fiyat),
              stok: parseInt(stok),
              kategori_id: parseInt(kategori),
              resim_url: resim !== "" ? resim : '/static/images/varsayilan.png'
          })
      });

      const sonuc = await cevap.json();

      if(cevap.ok) {
          mesajKutu.textContent = sonuc.mesaj;
          mesajKutu.className = "basarili";
          
          // Kutuları temizle
          document.getElementById('yeniUrunAd').value = "";
          document.getElementById('yeniFiyat').value = "";
          document.getElementById('yeniStok').value = "";
          document.getElementById('yeniResim').value = "";
      } else {
          mesajKutu.textContent = sonuc.hata;
          mesajKutu.className = "hatali";
      }
      mesajKutu.style.display = "block";
      setTimeout(() => { mesajKutu.style.display = "none"; }, 4000);

  } catch (err) {
      console.error(err);
  }
}

// --- GRAFİK ÇİZİMİ (Dashboard) ---
function grafikCiz() {
  if (window.myChart) return; // Zaten çizildiyse tekrar çizme
  const ctx = document.getElementById('satisGrafigi').getContext('2d');
  let gradient = ctx.createLinearGradient(0, 0, 0, 400);
  gradient.addColorStop(0, 'rgba(255, 140, 0, 0.5)'); gradient.addColorStop(1, 'rgba(255, 140, 0, 0.0)');
  window.myChart = new Chart(ctx, {
    type: 'line',
    data: { labels: ['Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'], datasets: [{ label: 'Satış (₺)', data: [4200, 5100, 3800, 6200, 8400, 14520, 11000], borderColor: '#ff8c00', backgroundColor: gradient, borderWidth: 3, pointBackgroundColor: '#00e5ff', fill: true, tension: 0.4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#2a2a35' }, ticks: { color: '#8b8b9e' } }, x: { grid: { display: false }, ticks: { color: '#8b8b9e' } } } }
  });
}
</script>
</body>
</html>
